apiVersion: v1
kind: Secret
metadata:
  name: kailab-runner-secret
  namespace: kailab-ci
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
type: Opaque
stringData:
  # Control plane URL - update this to your kailab-control service
  KR_CONTROL_PLANE: "http://kailab-control.kailab.svc.cluster.local:8080"
  # Unique runner ID - change for each runner instance
  KR_ID: "runner-1"
  # Runner display name
  KR_NAME: "kailab-runner-1"
