apiVersion: apps/v1
kind: Deployment
metadata:
  name: kailab-runner
  namespace: kailab-ci
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kailab-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kailab-runner
        app.kubernetes.io/part-of: kailab
    spec:
      serviceAccountName: kailab-runner
      containers:
        - name: runner
          image: YOUR_REGISTRY/kailab-runner:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: kailab-runner-config
            - secretRef:
                name: kailab-runner-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep kailab-runner"
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
        - name: tmp
          emptyDir: {}
      # Image pull handled via Workload Identity on GCP Artifact Registry
