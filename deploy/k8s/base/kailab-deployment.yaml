# Kailab K8s Deployment
# Data plane (graph storage) + Control plane (UI/API)
#
# Before deploying, create the database secret:
#   kubectl create secret generic kailab-db-secret \
#     --namespace=kailab \
#     --from-literal=DATABASE_URL='postgres://user:pass@host:5432/dbname?sslmode=require' \
#     --from-literal=JWT_SIGNING_KEY='your-secure-jwt-key'

---
apiVersion: v1
kind: Namespace
metadata:
  name: kailab

---
# Kailab Data Plane Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kailab
  namespace: kailab
  labels:
    app: kailab
    component: data-plane
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: kailab
  template:
    metadata:
      labels:
        app: kailab
        component: data-plane
    spec:
      containers:
        - name: kailab
          image: YOUR_REGISTRY/kailab:latest
          ports:
            - containerPort: 7447
              name: http
            - containerPort: 2222
              name: ssh
          command: ["sh", "-c"]
          args:
            - |
              cp /certs/client.key /tmp/client.key && chmod 600 /tmp/client.key
              cp /certs/client.crt /tmp/client.crt && chmod 644 /tmp/client.crt
              cp /certs/ca.crt /tmp/ca.crt && chmod 644 /tmp/ca.crt
              exec /app/kailabd
          env:
            - name: KAILAB_DB_URL
              valueFrom:
                secretKeyRef:
                  name: kailab-db-secret
                  key: DATABASE_URL
            - name: KAILAB_BLOB_BUCKET
              value: kailab-blobs
            - name: GCP_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: gcp-service-key
                  key: key
            - name: KAILAB_DATA
              value: /tmp/kailab-data
            - name: KAILAB_LISTEN
              value: ":7447"
            - name: KAILAB_SSH_LISTEN
              value: ":2222"
            - name: KAILAB_CONTROL_PLANE_URL
              value: "http://kailab-control:8080"
          volumeMounts:
            - name: db-certs
              mountPath: /certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7447
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7447
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: db-certs
          secret:
            secretName: kailab-db-certs
            defaultMode: 0400

---
# Kailab Data Plane Service
apiVersion: v1
kind: Service
metadata:
  name: kailab
  namespace: kailab
spec:
  selector:
    app: kailab
  ports:
    - port: 7447
      targetPort: 7447
      name: grpc
    - port: 2222
      targetPort: 2222
      name: ssh

---
# Kailab Control Plane Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kailab-control
  namespace: kailab
  labels:
    app: kailab-control
    component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kailab-control
  template:
    metadata:
      labels:
        app: kailab-control
        component: control-plane
    spec:
      containers:
        - name: kailab-control
          image: YOUR_REGISTRY/kailab-control:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KLC_LISTEN
              value: ":8080"
            - name: KLC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: kailab-db-secret
                  key: CONTROL_DATABASE_URL
            - name: KLC_JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: kailab-db-secret
                  key: JWT_SIGNING_KEY
            - name: KLC_POSTMARK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kailab-db-secret
                  key: POSTMARK_TOKEN
            - name: KLC_SHARDS_JSON
              value: '{"default":"http://kailab:7447"}'
            - name: KLC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: kailab-config
                  key: KLC_BASE_URL
            - name: KLC_MAGICLINK_FROM
              valueFrom:
                secretKeyRef:
                  name: kailab-config
                  key: KLC_MAGICLINK_FROM
            - name: KLC_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: kailab-config
                  key: KLC_ADMIN_EMAIL
          volumeMounts:
            - name: db-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-certs
          secret:
            secretName: kailab-db-certs
            defaultMode: 0400

---
# Kailab Control Plane Service
apiVersion: v1
kind: Service
metadata:
  name: kailab-control
  namespace: kailab
spec:
  selector:
    app: kailab-control
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
# SSH LoadBalancer for external git access
apiVersion: v1
kind: Service
metadata:
  name: kailab-ssh
  namespace: kailab
spec:
  type: LoadBalancer
  selector:
    app: kailab
  ports:
    - port: 22
      targetPort: 2222
      name: ssh

---
# Ingress for external access (nginx ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kailab-ingress
  namespace: kailab
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Cloudflare handles SSL termination, but you can also use cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
    - host: kaicontext.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kailab-control
                port:
                  number: 8080
