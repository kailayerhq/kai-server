apiVersion: v1
kind: ConfigMap
metadata:
  name: kailab-runner-config
  namespace: kailab-ci
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
data:
  # Runner configuration
  KR_NAMESPACE: "kailab-ci"
  KR_POLL_INTERVAL: "5s"
  KR_LABELS: "linux,amd64"
  # CI store (GCS)
  KR_GCS_BUCKET: "kailab-ci-store"
  KR_GCS_PREFIX: "ci"
  # Kubernetes service account for job pods (Workload Identity)
  KR_SERVICE_ACCOUNT: "kailab-runner"
