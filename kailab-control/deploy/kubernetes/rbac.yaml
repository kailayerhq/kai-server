apiVersion: v1
kind: ServiceAccount
metadata:
  name: kailab-runner
  namespace: kailab-ci
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
  annotations:
    iam.gke.io/gcp-service-account: kailab-runner@${GCP_PROJECT_ID}.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kailab-runner
  namespace: kailab-ci
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
rules:
  # Manage pods for CI job execution
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Execute commands in job pods
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Stream logs from job pods
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  # Check pod status
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
  # Manage secrets for pulling images (optional)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Manage configmaps for job configuration (optional)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  # Manage persistent volume claims for caching (optional)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kailab-runner
  namespace: kailab-ci
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
subjects:
  - kind: ServiceAccount
    name: kailab-runner
    namespace: kailab-ci
roleRef:
  kind: Role
  name: kailab-runner
  apiGroup: rbac.authorization.k8s.io
---
# Cross-namespace deploy: allow runner to update deployments in kailab namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kailab-deployer
  namespace: kailab
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "namespaces"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kailab-deployer
  namespace: kailab
  labels:
    app.kubernetes.io/name: kailab-runner
    app.kubernetes.io/part-of: kailab
subjects:
  - kind: ServiceAccount
    name: kailab-runner
    namespace: kailab-ci
roleRef:
  kind: Role
  name: kailab-deployer
  apiGroup: rbac.authorization.k8s.io
