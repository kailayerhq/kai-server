apiVersion: apps/v1
kind: Deployment
metadata:
  name: kai-docs
  namespace: kailab
  labels:
    app: kai-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kai-docs
  template:
    metadata:
      labels:
        app: kai-docs
    spec:
      containers:
        - name: kai-docs
          image: us-central1-docker.pkg.dev/PROJECT_ID/preplan/kai-docs:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kai-docs
  namespace: kailab
spec:
  selector:
    app: kai-docs
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kai-docs-ingress
  namespace: kailab
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: docs.kaicontext.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kai-docs
                port:
                  number: 80
